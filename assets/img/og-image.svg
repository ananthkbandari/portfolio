<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Ananth Bandari — Mechanical Design and Simulation Portfolio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#16223b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#26344f" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Technical motif: a stylised gear on the right -->
  <g transform="translate(960,315)" opacity="0.9">
    <g fill="none" stroke="url(#accent)" stroke-width="6">
      <circle r="150"/>
      <circle r="70"/>
    </g>
    <g fill="#60a5fa">
      <!-- 12 gear teeth -->
      <g id="tooth"><rect x="-14" y="-176" width="28" height="34" rx="4"/></g>
      <use href="#tooth" transform="rotate(30)"/>
      <use href="#tooth" transform="rotate(60)"/>
      <use href="#tooth" transform="rotate(90)"/>
      <use href="#tooth" transform="rotate(120)"/>
      <use href="#tooth" transform="rotate(150)"/>
      <use href="#tooth" transform="rotate(180)"/>
      <use href="#tooth" transform="rotate(210)"/>
      <use href="#tooth" transform="rotate(240)"/>
      <use href="#tooth" transform="rotate(270)"/>
      <use href="#tooth" transform="rotate(300)"/>
      <use href="#tooth" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Brand mark -->
  <rect x="80" y="150" width="64" height="64" rx="14" fill="#2563eb"/>
  <text x="112" y="194" text-anchor="middle"
        font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="800" fill="#ffffff">AB</text>

  <!-- Text block -->
  <text x="80" y="320" font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="74" font-weight="800" fill="#ffffff" letter-spacing="-2">Ananth Bandari</text>
  <text x="82" y="382" font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="34" font-weight="700" fill="#60a5fa">Mechanical Design &amp; Simulation</text>
  <text x="82" y="430" font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#94a3b8">SOLIDWORKS · Ansys FEA · Downloadable engineering files</text>

  <text x="82" y="540" font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="22" fill="#64748b">www.ananthbandari.bio</text>
</svg>
