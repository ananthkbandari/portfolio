<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Technical illustration of a topology-optimised quadcopter arm">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f6fb"/>
      <stop offset="1" stop-color="#e2e8f2"/>
    </linearGradient>
    <linearGradient id="cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="0.5" stop-color="#64748b"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#c9d5e8" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="640" height="400" fill="url(#bg2)"/>
  <rect width="640" height="400" fill="url(#grid2)" opacity="0.6"/>

  <!-- Root mounting plate (left) -->
  <rect x="70" y="150" width="90" height="110" rx="10" fill="url(#cf)" stroke="#1e293b" stroke-width="2.5"/>
  <circle cx="95" cy="178" r="7" fill="#0b1120"/>
  <circle cx="135" cy="178" r="7" fill="#0b1120"/>
  <circle cx="95" cy="232" r="7" fill="#0b1120"/>
  <circle cx="135" cy="232" r="7" fill="#0b1120"/>

  <!-- Tapered hollow arm -->
  <path d="M150 175 L470 196 L470 224 L150 245 Z" fill="url(#cf)" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- hollow window cut-outs to imply lightweighting -->
  <path d="M205 200 L300 205 L300 215 L205 220 Z" fill="#e8edf6" opacity="0.6"/>
  <path d="M330 206 L420 209 L420 214 L330 217 Z" fill="#e8edf6" opacity="0.6"/>

  <!-- Motor mount (right) -->
  <circle cx="500" cy="210" r="52" fill="url(#cf)" stroke="#1e293b" stroke-width="2.5"/>
  <circle cx="500" cy="210" r="24" fill="#cbd5e1" stroke="#1e293b" stroke-width="2"/>
  <circle cx="500" cy="170" r="6" fill="#0b1120"/>
  <circle cx="500" cy="250" r="6" fill="#0b1120"/>
  <circle cx="460" cy="210" r="6" fill="#0b1120"/>
  <circle cx="540" cy="210" r="6" fill="#0b1120"/>

  <!-- Dimension: length -->
  <g stroke="#2563eb" stroke-width="1.5" fill="#2563eb" font-family="system-ui, sans-serif" font-size="14">
    <line x1="150" y1="300" x2="500" y2="300" stroke-dasharray="4 3"/>
    <path d="M150 300l8-4v8z"/><path d="M500 300l-8-4v8z"/>
    <text x="325" y="320" text-anchor="middle">cantilever length L</text>
  </g>

  <!-- Label chips -->
  <g font-family="system-ui, 'Segoe UI', sans-serif">
    <rect x="24" y="30" width="280" height="38" rx="8" fill="#0f172a" opacity="0.86"/>
    <text x="40" y="54" fill="#ffffff" font-size="16" font-weight="700">Quadcopter Arm — SOLIDWORKS</text>
    <rect x="470" y="30" width="146" height="28" rx="14" fill="#2563eb"/>
    <text x="543" y="49" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">SAMPLE RENDER</text>
  </g>
</svg>
