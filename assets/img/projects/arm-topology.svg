<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Ansys topology optimisation result for the quadcopter arm">
  <defs>
    <linearGradient id="keep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="#0b1120"/>

  <!-- Design envelope (the box the optimiser worked inside) -->
  <rect x="80" y="120" width="470" height="160" fill="#13213b" stroke="#26344f" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- Removed (low-density) material hint -->
  <rect x="80" y="120" width="470" height="160" fill="#1d4ed8" opacity="0.10"/>

  <!-- Retained (load-bearing) material: an organic truss the solver kept -->
  <g fill="url(#keep)" stroke="#7f1d1d" stroke-width="1">
    <path d="M95 135
             C 150 150, 150 250, 95 265
             L 130 265
             C 180 235, 230 215, 300 205
             C 230 195, 180 175, 130 135 Z"/>
    <path d="M300 205 L500 200 L515 175 C 540 185, 540 235, 515 245 L500 220 Z"/>
    <!-- diagonal bracing struts -->
    <path d="M150 160 L300 198 L150 205 Z" opacity="0.92"/>
    <path d="M150 240 L300 212 L150 195 Z" opacity="0.92"/>
    <path d="M300 198 L470 196 L470 214 L300 212 Z" opacity="0.92"/>
  </g>

  <!-- Motor mount keep-out -->
  <circle cx="505" cy="210" r="34" fill="#0b1120" stroke="#ef4444" stroke-width="3"/>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">
    <rect x="80" y="312" width="16" height="16" rx="3" fill="url(#keep)"/>
    <text x="104" y="325">Retained material (kept by solver)</text>
    <rect x="330" y="312" width="16" height="16" rx="3" fill="#1d4ed8" opacity="0.4"/>
    <text x="354" y="325">Removed (35% mass target)</text>
  </g>

  <!-- Label chip -->
  <g font-family="system-ui, 'Segoe UI', sans-serif">
    <rect x="24" y="28" width="300" height="38" rx="8" fill="#000000" opacity="0.55"/>
    <text x="40" y="52" fill="#ffffff" font-size="16" font-weight="700">Ansys — Topology Optimisation</text>
  </g>
</svg>
